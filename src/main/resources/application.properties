spring.application.name=Syslab Employee Management

# Use 8080 if XAMPP Tomcat is stopped; otherwise change to 8081
server.port=3307

spring.datasource.url=jdbc:mysql://localhost:3306/emsdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

