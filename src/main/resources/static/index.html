<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Syslab Employee Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; }
        body { margin: 0; background:#0b0e12; color:#e7eef7; }
        .wrap { max-width: 980px; margin: 40px auto; padding: 0 16px; }
        h1 { margin: 0 0 18px; font-size: 26px; }
        .card { background:#121722; border:1px solid #273246; border-radius:14px; padding:16px; box-shadow: 0 6px 24px rgba(0,0,0,.25);}
        .row { display:flex; gap:12px; flex-wrap:wrap; }
        input, button, select { padding:10px 12px; border-radius:10px; border:1px solid #2b3952; background:#0f1420; color:#e7eef7; }
        input:focus { outline: 2px solid #3e7bfa; }
        button.primary { background:#3e7bfa; border-color:#3e7bfa; color:white; cursor:pointer; }
        button.warn { background:#e04848; border-color:#e04848; color:white; }
        table { width:100%; border-collapse: collapse; margin-top:12px; }
        th, td { border-bottom:1px solid #273246; padding:10px; text-align:left; font-size: 14px; }
        th { color:#b7c7e6; font-weight:600; }
        .muted { color:#93a4c4; }
        .right { margin-left:auto; }
        .pill { padding:4px 8px; border-radius:999px; background:#192235; color:#c8d6f5; font-size:12px; }
        .sp { height:10px; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Syslab Employee Management</h1>

    <div class="card">
        <div class="row">
            <input id="search" placeholder="Search name, email, department" />
            <button class="primary" id="btnSearch">Search</button>
            <span class="right muted" id="status">Ready</span>
        </div>

        <div class="sp"></div>

        <div class="row">
            <input id="firstName" placeholder="First name" />
            <input id="lastName" placeholder="Last name" />
            <input id="email" placeholder="Email" />
            <input id="department" placeholder="Department" />
            <input id="salary" type="number" placeholder="Salary" />
            <button class="primary" id="btnCreate">Add</button>
            <button id="btnReset">Reset</button>
        </div>

        <table id="tbl">
            <thead>
            <tr>
                <th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Salary</th><th></th>
            </tr>
            </thead>
            <tbody id="rows">
            <tr><td colspan="6" class="muted">No data</td></tr>
            </tbody>
        </table>

        <div class="row">
            <span class="pill" id="pageInfo">Page 1</span>
            <div class="right">
                <button id="prev">Prev</button>
                <button id="next">Next</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
